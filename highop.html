<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مترجم كتب الأزياء</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --bg: #F7F7F7;
            --white: #FFFFFF;
            --black: #111111;
            --gray: #777777;
            --lightGray: #E4E4E4;
            --ultraLight: #F0F0F0;
            --green: #1A9E55;
            --red: #D93535;
            --blue: #1A6FD9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', 'Helvetica Neue', Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            min-height: 100vh;
            padding: 28px 16px 48px;
            color: var(--black);
        }

        .container {
            max-width: 640px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 28px;
        }

        .header .subtitle {
            font-size: 0.66rem;
            letter-spacing: 4px;
            color: var(--gray);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .header h1 {
            font-size: 1.6rem;
            font-weight: 700;
        }

        .header .line {
            width: 28px;
            height: 2.5px;
            background: var(--black);
            margin-top: 12px;
            border-radius: 2px;
        }

        .upload-box {
            border: 2px dashed var(--lightGray);
            border-radius: 12px;
            padding: 32px 16px;
            text-align: center;
            cursor: pointer;
            background: var(--white);
            transition: all 0.15s;
            margin-bottom: 16px;
        }

        .upload-box.hover {
            border-color: var(--black);
            background: var(--ultraLight);
        }

        .upload-box .icon {
            font-size: 2.2rem;
            margin-bottom: 8px;
        }

        .upload-box .title {
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 0.95rem;
        }

        .upload-box .desc {
            font-size: 0.78rem;
            color: var(--gray);
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 14px;
        }

        .setting-card {
            background: var(--white);
            border: 1px solid var(--lightGray);
            border-radius: 10px;
            padding: 10px 12px;
        }

        .setting-card label {
            display: block;
            font-size: 0.62rem;
            color: var(--gray);
            letter-spacing: 1px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .setting-card input, .setting-card select {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 0.88rem;
            font-weight: 700;
            color: var(--black);
            outline: none;
            text-align: right;
        }

        .info-bar {
            background: var(--white);
            border: 1px solid var(--lightGray);
            border-radius: 8px;
            padding: 9px 14px;
            margin-bottom: 14px;
            font-size: 0.8rem;
            color: var(--gray);
            display: flex;
            justify-content: space-between;
            display: none;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 12px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.88rem;
            min-height: 46px;
            touch-action: manipulation;
            width: 100%;
            text-decoration: none;
        }

        .btn-primary { background: var(--black); color: var(--white); }
        .btn-ghost { background: var(--ultraLight); color: var(--black); }
        .btn-outline { background: var(--white); color: var(--black); border: 1.5px solid var(--lightGray); }
        .btn-green { background: var(--green); color: var(--white); }
        .btn-disabled { background: var(--lightGray); color: var(--gray); cursor: not-allowed; }

        .progress-box {
            background: var(--white);
            border: 1px solid var(--lightGray);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 16px;
            display: none;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.8rem;
        }

        .progress-bar-container {
            height: 4px;
            background: var(--lightGray);
            border-radius: 3px;
            margin-bottom: 12px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--black);
            width: 0%;
            transition: width 0.35s;
        }

        .log-box {
            max-height: 90px;
            overflow-y: auto;
            font-size: 0.7rem;
            font-family: monospace;
            color: var(--gray);
        }

        .results-container {
            margin-top: 20px;
        }

        .results-title {
            font-size: 0.66rem;
            letter-spacing: 3px;
            color: var(--gray);
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .result-card {
            background: var(--white);
            border: 1px solid var(--lightGray);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 10px;
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .result-number {
            font-size: 1rem;
            font-weight: 700;
            color: var(--lightGray);
            min-width: 28px;
        }

        .result-info { flex: 1; }
        .result-info .title { font-weight: 600; font-size: 0.9rem; }
        .result-info .subtitle { font-size: 0.72rem; color: var(--gray); margin-top: 1px; }

        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }

        .preview-box {
            margin-top: 12px;
            background: var(--ultraLight);
            border-radius: 8px;
            padding: 14px;
            display: none;
        }

        .preview-text {
            max-height: 220px;
            overflow-y: auto;
            font-size: 0.85rem;
            line-height: 1.8;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="subtitle">Fashion Book Translator</div>
        <h1>مترجم كتب الأزياء</h1>
        <div class="line"></div>
    </div>

    <div class="upload-box" id="uploadBox">
        <div class="icon">📄</div>
        <div class="title" id="uploadTitle">اضغط لرفع ملف PDF</div>
        <div class="desc" id="uploadDesc">أو اسحب وأفلت هنا</div>
        <input type="file" id="fileInput" accept=".pdf" style="display: none;">
    </div>

    <div class="settings-grid">
        <div class="setting-card">
            <label>صفحات/جزء</label>
            <input type="number" id="pageCount" value="100" min="1" max="500">
        </div>
        <div class="setting-card">
            <label>لغة المصدر</label>
            <select id="sourceLang">
                <option value="English">إنجليزية</option>
                <option value="French">فرنسية</option>
                <option value="Italian">إيطالية</option>
                <option value="Spanish">إسبانية</option>
            </select>
        </div>
        <div class="setting-card">
            <label>جودة الصور</label>
            <select id="imgQuality">
                <option value="2">عالية</option>
                <option value="1.5" selected>متوسطة</option>
                <option value="1">سريعة</option>
            </select>
        </div>
    </div>

    <div class="info-bar" id="infoBar">
        <span id="infoSegs"></span>
        <span id="infoPages"></span>
    </div>

    <button class="btn btn-disabled" id="translateBtn" disabled style="margin-bottom: 16px; font-size: 0.95rem; padding: 15px;">ابدأ الترجمة</button>

    <div class="progress-box" id="progressBox">
        <div class="progress-header">
            <span id="progressLabel" style="color: var(--gray);">جاري البدء...</span>
            <span id="progressPercent" style="font-weight: 700;">0%</span>
        </div>
        <div class="progress-bar-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="log-box" id="logBox"></div>
    </div>

    <div class="results-container" id="resultsContainer" style="display: none;">
        <div class="results-title">الأجزاء المترجمة</div>
        <div id="resultsList"></div>
    </div>
</div>

<script>
    if (window.pdfjsLib) {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    }

    let pdfInstance = null;
    let fileData = { name: '', size: 0, totalPages: 0 };

    const uploadBox = document.getElementById('uploadBox');
    const fileInput = document.getElementById('fileInput');
    const translateBtn = document.getElementById('translateBtn');
    const pageCountInput = document.getElementById('pageCount');
    const infoBar = document.getElementById('infoBar');
    const progressBox = document.getElementById('progressBox');
    const logBox = document.getElementById('logBox');

    uploadBox.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));
    pageCountInput.addEventListener('input', updateSegmentsInfo);

    function handleFile(file) {
        if (!file || file.type !== "application/pdf") return;
        
        fileData.name = file.name;
        fileData.size = (file.size / 1024 / 1024).toFixed(1);
        
        document.getElementById('uploadTitle').innerText = fileData.name;
        document.getElementById('uploadDesc').innerText = `${fileData.size} MB · جاري التحميل...`;

        const reader = new FileReader();
        reader.onload = async function(e) {
            try {
                const bytes = new Uint8Array(e.target.result);
                pdfInstance = await pdfjsLib.getDocument({ data: bytes }).promise;
                fileData.totalPages = pdfInstance.numPages;
                
                document.getElementById('uploadDesc').innerText = `${fileData.totalPages} صفحة · ${fileData.size} MB`;
                translateBtn.disabled = false;
                translateBtn.className = "btn btn-primary";
                updateSegmentsInfo();
            } catch (err) {
                alert("خطأ أثناء قراءة ملف الـ PDF: " + err.message);
            }
        };
        reader.readAsArrayBuffer(file);
    }

    function updateSegmentsInfo() {
        if (!pdfInstance) return;
        const size = Math.max(1, parseInt(pageCountInput.value) || 10);
        const totalSegs = Math.ceil(fileData.totalPages / size);
        
        infoBar.style.display = "flex";
        document.getElementById('infoSegs').innerHTML = `سيُقسَّم إلى <strong style="color: var(--black)">${totalSegs} جزء</strong>`;
        document.getElementById('infoPages').innerText = `${fileData.totalPages} صفحة`;
    }

    function addLog(msg, type = '') {
        const time = new Date().toLocaleTimeString("ar");
        let color = "var(--gray)";
        if (type === 'success') color = "var(--green)";
        if (type === 'error') color = "var(--red)";
        if (type === 'info') color = "var(--black)";

        const logItem = document.createElement('div');
        logItem.style.color = color;
        logItem.innerText = `${time} · ${msg}`;
        logBox.appendChild(logItem);
        logBox.scrollTop = logBox.scrollHeight;
    }

    async function pageToCanvas(pageNum) {
        const page = await pdfInstance.getPage(pageNum);
        const quality = parseFloat(document.getElementById('imgQuality').value);
        const viewport = page.getViewport({ scale: quality });
        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
        return canvas.toDataURL("image/jpeg", 0.85);
    }

    async function extractText(pageNum) {
        try {
            const page = await pdfInstance.getPage(pageNum);
            const tc = await page.getTextContent();
            return tc.items.map(i => i.str).join(" ").trim();
        } catch { return ""; }
    }

    async function translateText(text) {
        if (!text || text.length < 10) return "";
        const sourceLang = document.getElementById('sourceLang').value;
        try {
            const res = await fetch("https://api.anthropic.com/v1/messages", {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json",
                    "x-api-key": "YOUR_API_KEY_HERE", 
                    "anthropic-version": "2023-06-01",
                    "anthropic-dangerous-direct-browser-access": "true"
                },
                body: JSON.stringify({
                    model: "claude-3-5-sonnet-20241022",
                    max_tokens: 2000,
                    system: "أنت مترجم محترف متخصص في كتب وتاريخ الموضة والأزياء. ترجم النص بدقة تامة وبأسلوب فني يناسب المصطلحات الدارجة في المجال. أعطني النص العربي المترجم فقط دون أي مقدمات أو هوامش تف تفسيرية.",
                    messages: [{ role: "user", content: `ترجم النص التالي من لغة (${sourceLang}) إلى لغة (العربية):\n\n${text}` }]
                })
            });
            const d = await res.json();
            return d.content?.[0]?.text || "[خطأ في معالجة النص العربي]";
        } catch (e) { 
            console.error(e);
            return "[حدثت مشكلة في ربط الترجمة التلقائية - انسخ النص الأصلي للمعاينة]";
        }
    }

    translateBtn.addEventListener('click', async () => {
        if (!pdfInstance) return;
        
        translateBtn.disabled = true;
        translateBtn.className = "btn btn-disabled";
        translateBtn.innerText = "⏳ جاري الترجمة والتعريب...";
        
        progressBox.style.display = "block";
        logBox.innerHTML = "";
        document.getElementById('resultsList').innerHTML = "";
        
        const size = Math.max(1, parseInt(pageCountInput.value) || 10);
        const chunks = [];
        for (let i = 1; i <= fileData.totalPages; i += size) {
            chunks.push({
                title: `صفحات ${i}–${Math.min(i + size - 1, fileData.totalPages)}`,
                start: i,
                end: Math.min(i + size - 1, fileData.totalPages)
            });
        }

        addLog(`بدء التقسيم والتعريب · ${chunks.length} جزء إجمالي`, "info");

        for (let i = 0; i < chunks.length; i++) {
            const chunk = chunks[i];
            addLog(`▶ جاري معالجة: ${chunk.title}`, "info");
            
            try {
                const { jsPDF } = window.jspdf;
                // تعيين أبعاد معيارية للـ PDF لمنع تشوه الصور
                const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
                const W = doc.internal.pageSize.getWidth();
                const H = doc.internal.pageSize.getHeight();
                let firstPage = true;
                let chunkTextArray = [];

                for (let p = chunk.start; p <= chunk.end; p++) {
                    const pct = Math.round(((i + (p - chunk.start) / (chunk.end - chunk.start + 1)) / chunks.length) * 100);
                    document.getElementById('progressBar').style.width = pct + "%";
                    document.getElementById('progressPercent').innerText = pct + "%";
                    document.getElementById('progressLabel').innerText = `جزء ${i + 1} من ${chunks.length} · صفحة ${p}`;

                    if (!firstPage) doc.addPage();
                    firstPage = false;

                    // رسم صفحة الألبوم أو كتاب التصميم كخلفية ثابتة
                    const imgDataUrl = await pageToCanvas(p);
                    doc.addImage(imgDataUrl, "JPEG", 0, 0, W, H);

                    const text = await extractText(p);
                    if (text.length > 15) {
                        addLog(`استخراج وترجمة نصوص صفحة ${p}...`);
                        const translated = await translateText(text);
                        
                        // تخزين النص المترجم للنسخ والمعاينة المباشرة
                        chunkTextArray.push(`[صفحة ${p}]\n${translated}`);
                        
                        // شريط سفلي خفيف لإظهار حالة التعريب على ملف الـ PDF
                        doc.setFillColor(255, 255, 255);
                        doc.rect(0, H - 15, W, 15, "F");
                        doc.setFontSize(8);
                        doc.setTextColor(50, 50, 50);
                        doc.text("تم استخراج المحرك النصي - راجع صندوق المعاينة لنسخ النص العربي الكامل", W / 2, H - 7, { align: "center" });
                        addLog(`✓ تم حفظ النص العربي لصفحة ${p}`, "success");
                    } else {
                        addLog(`صفحة ${p} — أرشيف صور ورسومات فقط`, "muted");
                        chunkTextArray.push(`[صفحة ${p}]\n(صفحة تحتوي على رسومات أو صور فقط بدون نصوص)`);
                    }
                }

                const blob = doc.output("blob");
                const url = URL.createObjectURL(blob);
                const filename = `مترجم_عربي_جزء_${i + 1}_ص${chunk.start}-${chunk.end}.pdf`;
                const translationsText = chunkTextArray.join("\n\n---\n\n");

                renderResultCard(i, chunk.title, url, filename, translationsText);
                addLog(`✓ ${chunk.title} جاهز للتحميل والنسخ`, "success");

            } catch (err) {
                addLog(`✗ خطأ أثناء تشفير الجزء: ${err.message}`, "error");
            }
        }

        document.getElementById('progressBar').style.width = "100%";
        document.getElementById('progressPercent').innerText = "100%";
        document.getElementById('progressLabel').innerText = "اكتملت المعالجة بنجاح ✓";
        addLog("تم تجهيز كافة الأجزاء باللغة العربية 🎉", "success");
        
        translateBtn.disabled = false;
        translateBtn.className = "btn btn-primary";
        translateBtn.innerText = "ابدأ الترجمة";
    });

    function renderResultCard(index, title, blobUrl, filename, textContent) {
        const container = document.getElementById('resultsContainer');
        const list = document.getElementById('resultsList');
        container.style.display = "block";

        const card = document.createElement('div');
        card.className = "result-card";
        card.innerHTML = `
            <div class="result-header">
                <div class="result-number">${String(index + 1).padStart(2, '0')}</div>
                <div class="result-info">
                    <div class="title">${title}</div>
                    <div class="subtitle" style="color: var(--green); font-weight: 600;">مترجم وجاهز باللغة العربية ✓</div>
                </div>
            </div>
            <div class="action-grid">
                <button class="btn btn-primary" onclick="triggerDownload('${blobUrl}', '${filename}')">⬇ تنزيل PDF</button>
                <button class="btn btn-ghost" id="copyBtn-${index}">📋 نسخ النص العربي</button>
                <button class="btn btn-outline" id="previewBtn-${index}">👁 معاينة</button>
            </div>
            <div class="preview-box" id="previewBox-${index}">
                <div style="font-size: 0.68rem; color: var(--gray); letter-spacing: 2px; margin-bottom: 8px; text-transform: uppercase;">متن النص المترجم</div>
                <div class="preview-text" style="direction: rtl; text-align: right;">${textContent}</div>
            </div>
        `;

        list.appendChild(card);

        const copyBtn = card.querySelector(`#copyBtn-${index}`);
        copyBtn.addEventListener('click', (e) => {
            e.preventDefault();
            navigator.clipboard.writeText(textContent).then(() => {
                copyBtn.className = "btn btn-green";
                copyBtn.innerText = "✓ تم نسخ النص";
                setTimeout(() => {
                    copyBtn.className = "btn btn-ghost";
                    copyBtn.innerText = "📋 نسخ النص العربي";
                }, 2000);
            });
        });

        const previewBtn = card.querySelector(`#previewBtn-${index}`);
        const previewBox = card.querySelector(`#previewBox-${index}`);
        previewBtn.addEventListener('click', (e) => {
            e.preventDefault();
            if (previewBox.style.display === "block") {
                previewBox.style.display = "none";
                previewBtn.innerText = "👁 معاينة";
            } else {
                previewBox.style.display = "block";
                previewBtn.innerText = "✕ إغلاق المعاينة";
            }
        });
    }

    window.triggerDownload = function(url, filename) {
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    };
</script>

</body>
</html>
